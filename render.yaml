services:
  - type: web
    name: duty-room
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: duty-room-db
          property: connectionString

databases:
  - name: duty-room-db
    plan: free
    databaseName: duty_room
    user: duty_user